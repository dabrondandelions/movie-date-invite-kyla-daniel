<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Date?</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #e0f7f7;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      color: #006d6d;
    }

    p {
      color: #004c4c;
    }

    .buttons {
      position: relative;
      width: 100%;
      max-width: 300px;
      height: 150px;
    }

    button {
      padding: 14px 22px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: absolute;
    }

    #yes {
      background-color: #00a8a8;
      color: white;
      left: 20px;
      top: 50px;
    }

    #no {
      background-color: #b2dfdb;
      color: #004c4c;
      right: 20px;
      top: 50px;
    }
  </style>
</head>

<body>

<h1>hi, Kyla</h1>
<p>Would you like to watch a movie with me?</p>

<div class="buttons">
  <button id="yes" onclick="yesClicked()">Yes</button>
  <button id="no" ontouchstart="moveButton()" onmouseover="moveButton()">No</button>
</div>

<audio id="sound" src="https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3"></audio>

<script>
function yesClicked() {
  document.getElementById("sound").play();
  document.body.innerHTML = "<h1 style='color:#006d6d;'>kamsahamnida~ 💖</h1>";
}

function moveButton() {
  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");
  const container = document.querySelector(".buttons");

  const maxX = container.clientWidth - noBtn.offsetWidth;
  const maxY = container.clientHeight - noBtn.offsetHeight;

  let newX, newY;
  let safeDistance = 100; // minimum distance from YES button

  do {
    newX = Math.random() * maxX;
    newY = Math.random() * maxY;

    const yesRect = yesBtn.getBoundingClientRect();
    const containerRect = container.getBoundingClientRect();

    const yesX = yesRect.left - containerRect.left;
    const yesY = yesRect.top - containerRect.top;

    var distance = Math.hypot(newX - yesX, newY - yesY);

  } while (distance < safeDistance);

  noBtn.style.left = newX + "px";
  noBtn.style.top = newY + "px";
}
</script>

</body>
</html>
