<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Movie Date?</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; min-height: 100vh;
      overflow: hidden; 
    }

    body {
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #4db6ac 0%, #00796b 100%);
      background-attachment: fixed;
      background-size: cover;
    }

    #door-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #00796b;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #door-overlay h2 { color: white; margin-top: 20px; font-weight: 300; }
    .envelope-icon { font-size: 80px; animation: bounce 2s infinite; }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-20px);}
      60% {transform: translateY(-10px);}
    }

    .content-overlay {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 40px 20px;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 85%;
      max-width: 400px;
      z-index: 10;
      display: none; 
      position: relative;
    }

    .animate-pop {
      display: block !important;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.5); }
      70% { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    h1 { font-size: 2.2em; color: #006d6d; margin: 0 0 10px 0; }
    p { font-size: 1.1em; color: #004c4c; }
    
    .btn-container {
      height: 120px;
      width: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      touch-action: manipulation;
      position: absolute;
    }

    /* Yes button: 30% from left */
    #yes { 
      background-color: #00a8a8; 
      color: white; 
      z-index: 10;
      left: 30%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    /* No button: 30% from right initially */
    #no { 
      background-color: #b2dfdb; 
      color: #004c4c; 
      z-index: 50;
      left: 70%;
      top: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .heart {
      position: fixed;
      font-size: 25px;
      pointer-events: none;
      animation: floatUp 3.5s linear forwards;
      z-index: 100;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="door-overlay" onclick="openDoor()">
    <div class="envelope-icon">💌</div>
    <h2>You have a message...</h2>
    <p style="color: #b2dfdb;">(Tap to open)</p>
  </div>

  <div id="main-content" class="content-overlay">
    <h1>hi, Kyla</h1>
    <p>Would you like to watch a movie with me?</p>

    <div class="btn-container">
      <button id="yes" onclick="yesClicked()">Yes</button>
      <button id="no" 
              onmouseover="moveButton()" 
              onclick="moveButton()"
              ontouchstart="moveButton(event)">No</button>
    </div>
  </div>

  <audio id="bg-music" src="sweetnightguitar.mp3" loop preload="auto"></audio>

  <script>
    function openDoor() {
      const bgMusic = document.getElementById("bg-music");
      const door = document.getElementById("door-overlay");
      const content = document.getElementById("main-content");

      bgMusic.volume = 0.5; 
      bgMusic.play().catch(e => console.log("Music blocked"));

      door.style.opacity = "0";
      setTimeout(() => {
        door.style.visibility = "hidden";
        content.classList.add("animate-pop");
      }, 600);
    }

    function yesClicked() {
      const content = document.getElementById("main-content");
      const noBtn = document.getElementById("no");
      noBtn.style.display = "none";
      
      content.classList.remove("animate-pop");
      void content.offsetWidth; 

      content.innerHTML = `
        <h1 style="color:#006d6d;">Jin-jja-yo?<br>Jo-a-yo!</h1>
        <p><a href="https://discord.com/users/dabrondawg" style="color:#00796b; font-weight:bold; text-decoration:underline;" target="_blank">Really?<br>I'm glad!</a></p>
      `;
      
      content.classList.add("animate-pop");
      setInterval(createHeart, 250);
    }

    // No button moves inside content overlay only
    function moveButton(event) {
      if (event) event.preventDefault();

      const button = document.getElementById("no");
      const container = document.getElementById("main-content");

      const rect = container.getBoundingClientRect();

      // Calculate max/min position inside container
      const maxX = rect.width - button.offsetWidth - 10;
      const maxY = rect.height - button.offsetHeight - 10;

      // Random position inside container
      const newX = Math.random() * maxX;
      const newY = Math.random() * maxY;

      button.style.transform = `translate(${newX}px, ${newY}px)`;
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = Math.random() > 0.5 ? "💗" : "🤍";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.top = "100vh";
      heart.style.fontSize = (Math.random() * 20 + 20) + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 4000);
    }
  </script>

</body>
</html>
