<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Movie Date?</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden; /* Stops the page from bouncing/scrolling */
      background: radial-gradient(circle, #4db6ac 0%, #00796b 100%);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #door-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #00796b;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    .envelope-icon { font-size: 80px; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-20px);}
      60% {transform: translateY(-10px);}
    }

    .content-overlay {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 40px 20px;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 85%;
      max-width: 350px;
      text-align: center;
      display: none;
      z-index: 10;
    }

    .animate-pop {
      display: block !important;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    h1 { font-size: 2em; color: #006d6d; margin-bottom: 10px; }
    p { font-size: 1.1em; color: #004c4c; }

    .btn-container {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
      height: 60px; /* Space for buttons */
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      touch-action: manipulation;
    }

    #yes { background-color: #00a8a8; color: white; }

    #no {
      background-color: #b2dfdb;
      color: #004c4c;
      position: fixed; /* Fixed from the start prevents teleporting */
      /* Smooth movement timing */
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      z-index: 999;
    }

    .heart {
      position: fixed;
      pointer-events: none;
      animation: floatUp 3.5s linear forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body onload="initNoButton()">

  <div id="door-overlay" onclick="openDoor()">
    <div class="envelope-icon">💌</div>
    <h2 style="color:white; font-weight:300;">You have a message...</h2>
  </div>

  <div id="main-content" class="content-overlay">
    <h1>hi, Kyla</h1>
    <p>Would you like to watch a movie with me?</p>

    <div class="btn-container">
      <button id="yes" onclick="yesClicked()">Yes</button>
      <button id="no" 
              onmouseover="moveButton()" 
              onclick="moveButton()" 
              ontouchstart="moveButton(event)">No</button>
    </div>
  </div>

  <audio id="bg-music" src="sweetnightguitar.mp3" loop></audio>

  <script>
    const noBtn = document.getElementById("no");

    // 1. Position the "No" button correctly on load so it doesn't jump
    function initNoButton() {
      const container = document.querySelector('.btn-container');
      const rect = container.getBoundingClientRect();
      
      // Center it roughly next to the "Yes" button initially
      noBtn.style.left = (rect.left + rect.width / 2 + 10) + "px";
      noBtn.style.top = (rect.top + 5) + "px";
    }

    function openDoor() {
      const bgMusic = document.getElementById("bg-music");
      bgMusic.volume = 0.5;
      bgMusic.play().catch(() => {});
      
      document.getElementById("door-overlay").style.opacity = "0";
      setTimeout(() => {
        document.getElementById("door-overlay").style.visibility = "hidden";
        document.getElementById("main-content").classList.add("animate-pop");
        // Re-calculate initial position in case screen resized
        initNoButton();
      }, 600);
    }

    function moveButton(e) {
      if (e) e.preventDefault();

      const btnWidth = noBtn.offsetWidth;
      const btnHeight = noBtn.offsetHeight;

      // iPhone 16 Pro Safe Zones
      const topPadding = 100;    // Keeps it clear of the Dynamic Island
      const bottomPadding = 80;  // Keeps it clear of the Home Bar
      const sidePadding = 30;    // Keeps it clear of the curved edges

      // Calculate available range
      const availableWidth = window.innerWidth - btnWidth - (sidePadding * 2);
      const availableHeight = window.innerHeight - btnHeight - topPadding - bottomPadding;

      // Generate random position within safe zone
      const newX = Math.floor(Math.random() * availableWidth) + sidePadding;
      const newY = Math.floor(Math.random() * availableHeight) + topPadding;

      noBtn.style.left = newX + "px";
      noBtn.style.top = newY + "px";
    }

    function yesClicked() {
      const content = document.getElementById("main-content");
      noBtn.style.display = "none"; // Hide the pesky button
      
      content.innerHTML = `
        <h1 style="color:#006d6d;">Jin-jja-yo?<br>Jo-a-yo!</h1>
        <p><a href="https://discord.com/users/dabrondawg" style="color:#00796b; font-weight:bold;" target="_blank">Really?<br>I'm glad!</a></p>
      `;
      setInterval(createHeart, 250);
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = Math.random() > 0.5 ? "💗" : "🤍";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.top = "100vh";
      heart.style.fontSize = (Math.random() * 20 + 20) + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 4000);
    }
  </script>
</body>
</html>
