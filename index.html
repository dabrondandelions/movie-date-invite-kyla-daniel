<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Movie Date?</title>

  <style>
    /* Reset and ensure full height */
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #4db6ac 0%, #00796b 100%);
      background-attachment: fixed;
      background-size: cover;
    }

    /* The "Door" / Envelope Overlay */
    #door-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #00796b;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #door-overlay h2 {
      color: white;
      margin-top: 20px;
      font-weight: 300;
    }

    .envelope-icon {
      font-size: 80px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-20px);}
      60% {transform: translateY(-10px);}
    }

    /* Content overlay */
    .content-overlay {
      background-color: rgba(255, 255, 255, 0.85);
      padding: 40px 20px;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 85%;
      max-width: 400px;
      z-index: 10;
      display: none; /* Hidden until door opens */
    }

    h1 {
      font-size: 2.2em;
      color: #006d6d;
      margin-top: 0;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1em;
      color: #004c4c;
    }

    .btn-container {
      height: 120px;
      width: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #yes {
      background-color: #00a8a8;
      color: white;
      z-index: 11;
    }

    #no {
      background-color: #b2dfdb;
      color: #004c4c;
      transition: transform 0.1s ease;
      z-index: 11;
    }

    .heart {
      position: fixed;
      font-size: 25px;
      pointer-events: none;
      animation: floatUp 3s linear forwards;
      z-index: 100;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="door-overlay" onclick="openDoor()">
    <div class="envelope-icon">💌</div>
    <h2>You have a message...</h2>
    <p style="color: #b2dfdb;">(Tap to open)</p>
  </div>

  <div id="main-content" class="content-overlay">
    <h1>hi, Kyla</h1>
    <p>Would you like to watch a movie with me?</p>

    <div class="btn-container">
      <button id="yes" onclick="yesClicked()">Yes</button>
      <button id="no" ontouchstart="moveButton(event)" onmouseover="moveButton(event)">No</button>
    </div>
  </div>

  <audio id="bg-music" src="sweetnightguitar.mp3" loop preload="auto"></audio>
  <audio id="sound" src="https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3" preload="auto"></audio>

  <script>
    function openDoor() {
      const bgMusic = document.getElementById("bg-music");
      const door = document.getElementById("door-overlay");
      const content = document.getElementById("main-content");

      // Play music (interaction allows this now)
      bgMusic.volume = 0.5; 
      bgMusic.play().catch(e => console.log("Music play blocked"));

      // Fade out the door
      door.style.opacity = "0";
      setTimeout(() => {
        door.style.visibility = "hidden";
        content.style.display = "block";
      }, 800);
    }

    function yesClicked() {
      const sound = document.getElementById("sound");
      sound.play().catch(e => console.log("Sound effect blocked"));

      document.getElementById("main-content").innerHTML = `
        <h1 style="color:#006d6d;">kamsahamnida~ 💖</h1>
        <p>See you soon!</p>
      `;

      setInterval(createHeart, 300);
    }

    function moveButton(event) {
      if (event.type === 'touchstart') {
        event.preventDefault();
      }

      const button = document.getElementById("no");
      const padding = 50;
      const maxX = window.innerWidth - button.offsetWidth - padding;
      const maxY = window.innerHeight - button.offsetHeight - padding;

      button.style.position = "fixed";
      
      const newX = Math.max(padding, Math.random() * maxX);
      const newY = Math.max(padding, Math.random() * maxY);

      button.style.left = newX + "px";
      button.style.top = newY + "px";
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.top = "100vh";
      heart.style.fontSize = (Math.random() * 20 + 20) + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 3000);
    }
  </script>

</body>
</html>
