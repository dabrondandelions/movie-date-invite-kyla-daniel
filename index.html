<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Movie Date?</title>

  <style>
    /* Prevent scrolling/bouncing on iPhone */
    html, body {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      /* === START BACKGROUND IMAGE UPDATE === */
      /* dreamy sunset background to fit the romantic theme */
      background-image: url('https://images.unsplash.com/photo-1521080755838-d2311117f767?q=80&w=1080&auto=format&fit=crop');
      background-size: cover;        /* Ensures image covers the whole screen */
      background-position: center;  /* Centers the image */
      background-repeat: no-repeat;
      background-attachment: fixed; /* Extra compatibility for iOS to keep it still */
      /* === END BACKGROUND IMAGE UPDATE === */
    }

    /* Slight tint overlay to make text more readable, especially on bright images */
    .content-overlay {
        background-color: rgba(255, 255, 255, 0.4); /* Adjust opacity here */
        padding: 30px;
        border-radius: 20px;
    }

    h1 {
      font-size: 2.5em;
      color: #006d6d;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      color: #004c4c;
    }

    /* Container keeps the Yes button stable */
    .btn-container {
      height: 100px;
      width: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #yes {
      background-color: #00a8a8;
      color: white;
      z-index: 10; /* Keep it above flying hearts */
    }

    #no {
      background-color: #b2dfdb;
      color: #004c4c;
      position: relative;
      transition: 0.1s ease;
      z-index: 5;
    }

    .heart {
      position: absolute;
      font-size: 25px;
      pointer-events: none;
      animation: floatUp 3s linear forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

<div id="main-content" class="content-overlay">
  <h1>hi, Kyla</h1>
  <p>Would you like to watch a movie with me?</p>

  <div class="btn-container">
    <button id="yes" onclick="yesClicked()">Yes</button>
    <button id="no" ontouchstart="moveButton(event)" onmouseover="moveButton(event)">No</button>
  </div>
</div>

<audio id="sound" src="https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3" preload="auto"></audio>

<script>
function yesClicked() {
  const sound = document.getElementById("sound");
  sound.play();

  document.getElementById("main-content").innerHTML = `
    <h1 style="color:#006d6d; animation: popIn 1s ease;">kamsahamnida~ 💖</h1>
  `;

  setInterval(createHeart, 300);
}

function moveButton(event) {
  // Prevent the "No" button from triggering a click event after it moves
  if (event.type === 'touchstart') {
    event.preventDefault();
  }

  const button = document.getElementById("no");
  
  // Calculate boundaries (staying within the visible screen)
  const padding = 20;
  const maxX = window.innerWidth - button.offsetWidth - padding;
  const maxY = window.innerHeight - button.offsetHeight - padding;

  // Change to absolute positioning relative to the body
  button.style.position = "fixed";
  
  // Randomize location
  const newX = Math.max(padding, Math.random() * maxX);
  const newY = Math.max(padding, Math.random() * maxY);

  button.style.left = newX + "px";
  button.style.top = newY + "px";
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.top = "100vh";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 3000);
}
</script>

</body>
</html>
