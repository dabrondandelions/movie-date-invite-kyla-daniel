<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Date?</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      margin-top: 100px;
    }
    
    h1 {
      font-size: 2.5em;
    }
    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #yes {
      background-color: #ff66a3;
      color: white;
    }
    #no {
      background-color: #ccc;
    }
  </style>
</head>
<body>

<h1>hi, Kyla</h1>
<p>Would you like to watch a movie with me?</p>

<button id="yes" onclick="yesClicked()">Yes</button>
<button id="no" onmouseover="moveButton()">No</button>

<script>
function yesClicked() {
  document.body.innerHTML = "<h1>kamsahamnida~</h1>";
}

function moveButton() {
  const button = document.getElementById("no");
  button.style.position = "absolute";
  button.style.top = Math.random() * window.innerHeight + "px";
  button.style.left = Math.random() * window.innerWidth + "px";
}
</script>

</body>
</html>
