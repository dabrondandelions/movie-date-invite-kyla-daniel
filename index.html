<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Movie Date?</title>

  <style>
    /* Reset and ensure full height */
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh; /* Vital for mobile background visibility */
      overflow-x: hidden; /* Prevent horizontal side-scrolling */
    }

    body {
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      /* Fixed Teal Gradient */
      background: radial-gradient(circle, #4db6ac 0%, #00796b 100%);
      background-attachment: fixed;
      background-size: cover;
    }

    /* Content overlay that lets the background show through */
    .content-overlay {
        background-color: rgba(255, 255, 255, 0.85); /* Slightly less transparent for better text contrast */
        padding: 40px 20px;
        border-radius: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 85%; /* Ensures the teal background is visible on the sides */
        max-width: 400px; /* Keeps it from getting too wide on tablets */
        z-index: 10;
    }

    h1 {
      font-size: 2.2em;
      color: #006d6d;
      margin-top: 0;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1em;
      color: #004c4c;
    }

    .btn-container {
      height: 120px;
      width: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #yes {
      background-color: #00a8a8;
      color: white;
      z-index: 11;
    }

    #no {
      background-color: #b2dfdb;
      color: #004c4c;
      transition: transform 0.1s ease;
      z-index: 11;
    }

    .heart {
      position: fixed; /* Changed to fixed so they float over everything */
      font-size: 25px;
      pointer-events: none;
      animation: floatUp 3s linear forwards;
      z-index: 100;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>

<div id="main-content" class="content-overlay">
  <h1>hi, Kyla</h1>
  <p>Would you like to watch a movie with me?</p>

  <div class="btn-container">
    <button id="yes" onclick="yesClicked()">Yes</button>
    <button id="no" ontouchstart="moveButton(event)" onmouseover="moveButton(event)">No</button>
  </div>
</div>

<audio id="sound" src="https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3" preload="auto"></audio>

<script>
function yesClicked() {
  const sound = document.getElementById("sound");
  sound.play().catch(e => console.log("Audio play blocked until interaction"));

  document.getElementById("main-content").innerHTML = `
    <h1 style="color:#006d6d;">kamsahamnida~ 💖</h1>
    <p>See you soon!</p>
  `;

  setInterval(createHeart, 300);
}

function moveButton(event) {
  // Prevent the "No" button from triggering a click event on mobile
  if (event.type === 'touchstart') {
    event.preventDefault();
  }

  const button = document.getElementById("no");
  
  // Constrain movement to the visible screen area
  const padding = 50;
  const maxX = window.innerWidth - button.offsetWidth - padding;
  const maxY = window.innerHeight - button.offsetHeight - padding;

  button.style.position = "fixed";
  
  const newX = Math.max(padding, Math.random() * maxX);
  const newY = Math.max(padding, Math.random() * maxY);

  button.style.left = newX + "px";
  button.style.top = newY + "px";
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.top = "100vh";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 3000);
}
</script>

</body>
</html>
