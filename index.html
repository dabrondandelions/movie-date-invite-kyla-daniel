<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Date?</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #4db6ac, #00796b);
    }

    .content-overlay {
      background: rgba(255,255,255,0.9);
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      position: relative;
      width: 300px;
    }

    .btn-container {
      position: relative;
      height: 120px;
      margin-top: 20px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      position: absolute;
      transition: all 0.5s ease; /* 🔥 smooth movement */
    }

    /* YES button (fixed, symmetric) */
    #yes {
      background: #00a8a8;
      color: white;
      left: 30%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    /* NO button */
    #no {
      background: #b2dfdb;
      color: #004c4c;

      /* perfectly symmetric start */
      left: 70%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <div class="content-overlay">
    <h2>hi, Kyla</h2>
    <p>Would you like to watch a movie with me?</p>

    <div class="btn-container">
      <button id="yes">Yes</button>
      <button id="no"
        onmouseover="moveButton()"
        onclick="moveButton()"
        ontouchstart="moveButton(event)">
        No
      </button>
    </div>
  </div>

  <script>
    function moveButton(e) {
      if (e) e.preventDefault();

      const btn = document.getElementById("no");

      const maxX = window.innerWidth - btn.offsetWidth;
      const maxY = window.innerHeight - btn.offsetHeight;

      const newX = Math.random() * maxX;
      const newY = Math.random() * maxY;

      // 🔥 smooth movement using left/top only
      btn.style.left = newX + "px";
      btn.style.top = newY + "px";

      // remove centering transform after first move
      btn.style.transform = "translate(0,0)";
      btn.style.position = "fixed";
    }
  </script>

</body>
</html>
